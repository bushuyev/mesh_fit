[env]
LIBTORCH = "/home/bu/dvl/torch/libtorch-2.7.1"
# tch/torch-sys 0.20 expects 2.7.0; local install is 2.7.1+cu126.
LIBTORCH_BYPASS_VERSION_CHECK = "1"
LIBTORCH_CXX11_ABI = "1"
